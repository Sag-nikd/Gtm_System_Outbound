version: '3.9'

services:
  pipeline:
    build: .
    env_file:
      - .env
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - STORAGE_ENABLED=${STORAGE_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./outputs:/app/outputs
      - ./config:/app/config
    depends_on:
      db:
        condition: service_healthy
        required: false

  dashboard:
    build: .
    command: python scripts/dashboard_api.py --host 0.0.0.0 --port 5050
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./outputs:/app/outputs
      - ./dashboard:/app/dashboard
    ports:
      - "${DASHBOARD_PORT:-5050}:5050"
    restart: unless-stopped
    profiles:
      - dashboard

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gtm_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-gtm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtm_dev_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gtm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  pgdata:
